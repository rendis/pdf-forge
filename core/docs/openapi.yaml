openapi: 3.0.0
info:
  contact:
    email: support@example.com
    name: API Support
  description: Document Assembly System API - Template management and document generation
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Doc Engine API
  version: "1.0"
paths:
  /api/v1/content/injectables:
    get:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ListInjectablesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: List injectables
      tags:
        - Injectables
  "/api/v1/content/injectables/{injectableId}":
    get:
      parameters:
        - description: Injectable ID
          in: path
          name: injectableId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.InjectableResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: Get injectable
      tags:
        - Injectables
  /api/v1/content/templates:
    get:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Filter by folder ID. Use 'root' to get only root-level templates
            (no folder)
          in: query
          name: folderId
          schema:
            type: string
        - description: Filter by published status
          in: query
          name: hasPublishedVersion
          schema:
            type: boolean
        - description: Filter by tag IDs
          in: query
          name: tagIds
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: Search by title
          in: query
          name: search
          schema:
            type: string
        - description: Limit results
          in: query
          name: limit
          schema:
            type: integer
        - description: Offset results
          in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ListTemplatesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: List templates
      tags:
        - Templates
    post:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                primary_http_dto.CreateTemplateRequest"
        description: Template data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.TemplateCreateResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: Create template
      tags:
        - Templates
  "/api/v1/content/templates/{templateId}":
    delete:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Template ID
          in: path
          name: templateId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: Delete template
      tags:
        - Templates
    get:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Template ID
          in: path
          name: templateId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.TemplateWithDetailsResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: Get template
      tags:
        - Templates
    put:
      description: Updates a template's metadata. Use folderId="root" to move the
        template to the root folder.
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Template ID
          in: path
          name: templateId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                primary_http_dto.UpdateTemplateRequest"
        description: Template data (folderId can be a folder UUID or 'root' to move to root)
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.TemplateResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: Update template
      tags:
        - Templates
  "/api/v1/content/templates/{templateId}/all-versions":
    get:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Template ID
          in: path
