              schema:
                $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                  primary_http_dto.ErrorResponse"
      summary: List template versions
      tags:
        - Template Versions
    post:
      parameters:
        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Template ID
          in: path
          name: templateId
          required: true
          schema:
            type: string
      requestBody:
        content:
