      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/github_com_rendis_pdf-forge_core_internal_adapters_\
                primary_http_dto.RenderPreviewRequest"
        description: Injectable values
        required: true
      responses:
        "200":
          description: OK
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
