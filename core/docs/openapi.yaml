        - description: Workspace ID
          in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
        - description: Template ID
          in: path
          name: templateId
          required: true
          schema:
            type: string
        - description: Version ID
          in: path
          name: versionId
          required: true
          schema:
